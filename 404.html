<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Stackly Digital Marketing</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="./components/base.css" />
  <link rel="stylesheet" href="./404.css" />
</head>

<body class="error-page-body">

  <main class="error-page">
    <div class="error-card">
      <div class="error-orbit" aria-hidden="true">
        <span></span>
        <span></span>
        <i class="fas fa-compass"></i>
      </div>
      <p class="error-code" aria-hidden="true">404</p>
      <h1>Page Not Found</h1>
      <p>
        The page you&apos;re looking for doesn&apos;t exist or has been moved.
        Let&apos;s get you back on track.
      </p>
      <div class="error-actions">
        <a href="./index.html" class="error-btn error-btn--primary">
          <i class="fas fa-home"></i> Back to Home
        </a>
        <button type="button" class="error-btn error-btn--ghost" onclick="history.back()">
          <i class="fas fa-arrow-left"></i> Go Back
        </button>
      </div>
    </div>
  </main>

</body>
</html>
